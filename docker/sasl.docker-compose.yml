services:
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:latest
    container_name: redpanda
    restart: unless-stopped

    ports:
      - "9092:9092"
      - "19092:19092"
      - "9644:9644"

    command:
      - redpanda
      - start

      - --overprovisioned
      - --smp=1
      - --memory=1G
      - --reserve-memory=0M
      - --node-id=0
      - --check=false

      # topics
      - --set
      - redpanda.auto_create_topics_enabled=true

      # auth
      - --set
      - redpanda.enable_sasl=true

      - --set
      - redpanda.superusers=[admin]

      # listeners
      - --set
      - redpanda.kafka_api_listener_protocol_map=INTERNAL:SASL_PLAINTEXT,EXTERNAL:SASL_PLAINTEXT

      # internal
      - --kafka-addr
      - INTERNAL://0.0.0.0:9092

      - --advertise-kafka-addr
      - INTERNAL://redpanda:9092

      # external
      - --kafka-addr
      - EXTERNAL://0.0.0.0:19092

      - --advertise-kafka-addr
      - EXTERNAL://localhost:19092

    volumes:
      - ./redpanda:/var/lib/redpanda/data

  console:
    image: docker.redpanda.com/redpandadata/console:latest
    container_name: redpanda_console
    restart: unless-stopped

    ports:
      - "8080:8080"

    environment:
      KAFKA_BROKERS: redpanda:9092

      KAFKA_SASL_ENABLED: "true"
      KAFKA_SASL_MECHANISM: SCRAM-SHA-256
      KAFKA_SASL_USERNAME: admin
      KAFKA_SASL_PASSWORD: admin-password

    depends_on:
      - redpanda